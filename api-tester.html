<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Ledger | API Tester</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #10b981;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-bar {
            background: var(--card);
            padding: 15px 25px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .url-input {
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--accent);
            padding: 8px 12px;
            border-radius: 6px;
            width: 350px;
            font-family: monospace;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .card {
            background: var(--card);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
        }

        .card h2 {
            margin-top: 0;
            font-size: 1.25rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        input {
            width: 100%;
            padding: 10px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            transition: border 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .response-area {
            grid-column: span 2;
            margin-top: 25px;
        }

        pre {
            background: #000;
            padding: 20px;
            border-radius: 12px;
            overflow-x: auto;
            border: 1px solid var(--primary);
            color: #10b981;
            font-size: 0.9rem;
            min-height: 100px;
            max-height: 400px;
        }

        .token-badge {
            font-size: 0.8rem;
            background: var(--accent);
            color: black;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Ledger API Explorer</h1>
        <p style="color: var(--text-dim)">Test your live backend deployment on Render</p>
    </header>

    <div class="status-bar">
        <div>
            Backend URL: 
            <input type="text" id="baseUrl" class="url-input" value="https://backend-ledger-94h2.onrender.com">
        </div>
        <div id="authStatus">
            <span style="color: var(--text-dim)">Auth Status:</span> 
            <span id="tokenStatus" style="color: #ef4444">Not Logged In</span>
        </div>
    </div>

    <div class="grid">
        <!-- Register -->
        <div class="card">
            <h2>User Registration</h2>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="regName" placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="regEmail" placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPassword" placeholder="••••••••">
            </div>
            <button onclick="handleRegister()">Register User</button>
        </div>

        <!-- Login -->
        <div class="card">
            <h2>User Login</h2>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>
            <button onclick="handleLogin()" style="background: var(--accent)">Login</button>
        </div>

        <!-- Create Account -->
        <div class="card" style="grid-column: span 2;">
            <h2>Create Ledger Account</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; align-items: end;">
                <div class="form-group">
                    <label>Account Name</label>
                    <input type="text" id="accName" placeholder="Savings">
                </div>
                <div class="form-group">
                    <label>Initial Balance</label>
                    <input type="number" id="accBalance" value="1000">
                </div>
                <button onclick="handleCreateAccount()" style="margin-bottom: 15px;">Create Account</button>
            </div>
        </div>

        <!-- Response Area -->
        <div class="response-area">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h2 style="margin: 0">Response Output</h2>
                <button onclick="clearLogs()" style="width: auto; padding: 5px 15px; background: transparent; border: 1px solid var(--text-dim); color: var(--text-dim); font-size: 0.8rem;">Clear</button>
            </div>
            <pre id="output">Click a button to see the server response...</pre>
        </div>
    </div>
</div>

<script>
    let authToken = localStorage.getItem('ledgerToken') || null;
    updateAuthDisplay();

    function updateAuthDisplay() {
        const status = document.getElementById('tokenStatus');
        if (authToken) {
            status.innerText = "Logged In (Token Saved)";
            status.style.color = "#10b981";
        } else {
            status.innerText = "Not Logged In";
            status.style.color = "#ef4444";
        }
    }

    function showResponse(data) {
        document.getElementById('output').innerText = JSON.stringify(data, null, 2);
    }

    function clearLogs() {
        document.getElementById('output').innerText = "Logs cleared.";
    }

    async function apiCall(endpoint, method, body, requiresAuth = false) {
        const baseUrl = document.getElementById('baseUrl').value;
        const url = `${baseUrl}${endpoint}`;
        
        const headers = {
            'Content-Type': 'application/json'
        };

        if (requiresAuth && authToken) {
            headers['Authorization'] = `Bearer ${authToken}`;
        }

        try {
            const response = await fetch(url, {
                method,
                headers,
                body: body ? JSON.stringify(body) : null
            });
            const data = await response.json();
            showResponse(data);
            return data;
        } catch (error) {
            showResponse({ error: "Network error. Check console.", message: error.message });
        }
    }

    async function handleRegister() {
        const body = {
            name: document.getElementById('regName').value,
            email: document.getElementById('regEmail').value,
            password: document.getElementById('regPassword').value
        };
        const res = await apiCall('/api/auth/register', 'POST', body);
        if (res.token) {
            authToken = res.token;
            localStorage.setItem('ledgerToken', res.token);
            updateAuthDisplay();
        }
    }

    async function handleLogin() {
        const body = {
            email: document.getElementById('loginEmail').value,
            password: document.getElementById('loginPassword').value
        };
        const res = await apiCall('/api/auth/login', 'POST', body);
        if (res.token) {
            authToken = res.token;
            localStorage.setItem('ledgerToken', res.token);
            updateAuthDisplay();
        }
    }

    async function handleCreateAccount() {
        const body = {
            accountName: document.getElementById('accName').value,
            initialBalance: document.getElementById('accBalance').value
        };
        await apiCall('/api/accounts', 'POST', body, true);
    }
</script>

</body>
</html>
